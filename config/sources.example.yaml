    url: https://www.upwork.com
    categories: [WEB_APP, DATA_DASHBOARD, AI_AUTOMATION, SCRAPING_DATA, WORDPRESS, BUG_FIX, OTHER]
    fee_notes: "10% flat fee on all earnings"
    vetted: false
    region: global
