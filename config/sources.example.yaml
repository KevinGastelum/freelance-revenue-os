# Freelance platform source directory
# freelance-os init copies this to config/sources.yaml if absent.
# Edit sources.yaml to customize for your workflow.
#
# categories: subset of WEB_APP, DATA_DASHBOARD, AI_AUTOMATION,
#             SCRAPING_DATA, WORDPRESS, BUG_FIX, OTHER

sources:
